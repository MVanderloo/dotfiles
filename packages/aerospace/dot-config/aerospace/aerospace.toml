after-login-command = []

# Add commands that run after AeroSpace startup.
# 'after-startup-command' is run after 'after-login-command'
# Available commands : https://nikitabobko.github.io/AeroSpace/commands
after-startup-command = []

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
key-mapping.preset = 'qwerty'

# Mouse follows focus when focused monitor changes
# Drop it from your config, if you don't like this behavior
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
# See https://nikitabobko.github.io/AeroSpace/commands#move-mouse
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = true

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
	inner.horizontal = 0
	inner.vertical =   0
	outer.left =       0
	outer.bottom =     0
	outer.top =        0
	outer.right =      0

[mode.main.binding]
    cmd-shift-c = 'reload-config'

    cmd-enter = '''exec-and-forget osascript -e '
    tell application "Ghostty"
        do script
        activate
    end tell'
    '''

	cmd-slash = 'layout tiles horizontal vertical'
	cmd-shift-slash = 'layout accordion horizontal vertical'

    cmd-h = 'focus left'
    cmd-j = 'focus down'
    cmd-k = 'focus up'
    cmd-l = 'focus right'
    # cmd-h = 'focus --boundaries-action wrap-around-the-workspace left'
    # cmd-j = 'focus --boundaries-action wrap-around-the-workspace down'
    # cmd-k = 'focus --boundaries-action wrap-around-the-workspace up'
    # cmd-l = 'focus --boundaries-action wrap-around-the-workspace right'

    cmd-shift-h = 'move left'
    cmd-shift-j = 'move down'
    cmd-shift-k = 'move up'
    cmd-shift-l = 'move right'

    # Consider using 'join-with' command as a 'split' replacement if you want to enable
    # normalizations
    # cmd-quote = 'join-with horizontal'
    # cmd-shift-quote = 'join-with vertical'

    cmd-m = 'fullscreen'

    # cmd-s = 'layout v_accordion' # 'layout stacking' in i3
    # cmd-w = 'layout h_accordion' # 'layout tabbed' in i3
    # cmd-space = 'layout tiles horizontal vertical' # 'layout toggle split' in i3
    # cmd-shift-space = 'layout floating tiling' # 'floating toggle' in i3

	cmd-comma = 'workspace prev'
	cmd-period = 'workspace next'

    cmd-1 = 'workspace 1'
    cmd-2 = 'workspace 2'
    cmd-3 = 'workspace 3'
    cmd-4 = 'workspace 4'
    cmd-5 = 'workspace 5'
    cmd-6 = 'workspace 6'
    cmd-7 = 'workspace 7'
    cmd-8 = 'workspace 8'
    cmd-9 = 'workspace 9'
    cmd-0 = 'workspace 10'

    cmd-shift-1 = [ 'move-node-to-workspace 1', 'workspace 1']
    cmd-shift-2 = [ 'move-node-to-workspace 2', 'workspace 2']
    cmd-shift-3 = [ 'move-node-to-workspace 3', 'workspace 3']
    cmd-shift-4 = [ 'move-node-to-workspace 4', 'workspace 4']
    cmd-shift-5 = [ 'move-node-to-workspace 5', 'workspace 5']
    cmd-shift-6 = [ 'move-node-to-workspace 6', 'workspace 6']
    cmd-shift-7 = [ 'move-node-to-workspace 7', 'workspace 7']
    cmd-shift-8 = [ 'move-node-to-workspace 8', 'workspace 8']
    cmd-shift-9 = [ 'move-node-to-workspace 9', 'workspace 9']
    cmd-shift-0 = [ 'move-node-to-workspace 10', 'workspace 10']

	cmd-e = 'balance-sizes'
	# cmd-delete = 'enable toggle'

	cmd-r = 'mode resize'
	cmd-shift-semicolon = 'mode service'

[mode.resize.binding]
    h = 'resize width -50'
    j = 'resize height +50'
    k = 'resize height -50'
    l = 'resize width +50'
    enter = 'mode main'
    esc = 'mode main'

