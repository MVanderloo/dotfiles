# ── Keybinds ──────────────────────────────────────────────────────────────────
# Shared keybind defaults for panel navigation.

[keybinds]
validate      = ["return", "kp_enter", "space"]
cancel        = ["escape"]
left          = ["left"]
right         = ["right"]
up            = ["up"]
down          = ["down"]
tab_next      = ["tab"]
tab_previous  = ["shift+iso_left_tab"]
