# ── Shell ─────────────────────────────────────────────────────────────────────
# Shared shell settings — same across all machines.

[shell]
ui_scale              = 1.0
corner_radius_scale   = 1.0          # 0 = square, 1 = default, 2 = extra rounded
font_family           = "sans-serif"
time_format           = "{:%H:%M}"
date_format           = "%A, %x"
offline_mode          = false
telemetry_enabled     = false
setup_wizard_enabled  = true
polkit_agent          = false
password_style        = "default"    # default | random
settings_show_advanced = false
middle_click_opens_widget_settings = true
show_location         = true
clipboard_enabled     = true
clipboard_history_max_entries = 100
clipboard_confirm_clear_history = true
clipboard_auto_paste  = "auto"       # off | auto | ctrl_v | ctrl_shift_v | shift_insert
clipboard_image_action_command = ""
shared_gl_context     = true
app_icon_colorize     = false

[shell.privacy]
mic_filter_regex  = ""
cam_filter_regex  = ""
screen_filter_regex = ""

[shell.animation]
enabled = true
speed   = 1.0                       # 0.5 = 2× slower, 2.0 = 2× faster

[shell.shadow]
direction = "down"
alpha     = 0.55

[shell.panel]
transparency_mode     = "glass"     # solid | soft | glass
borders               = true
shadow                = true
launcher_placement       = "centered"
clipboard_placement      = "centered"
control_center_placement = "attached"
wallpaper_placement      = "attached"
session_placement        = "attached"

[shell.launcher]
categories     = true
show_icons     = true
compact        = false
app_grid       = false
session_search = false
sort_by_usage  = true

[shell.screen_corners]
enabled = false
size    = 32

[shell.screenshot]
save_to_file      = true
directory         = ""
filename_pattern  = "screenshot_%Y%m%d_%H%M%S"
copy_to_clipboard = true
freeze_screen     = false
confirm_region    = false
pipe_to_command   = false
pipe_command      = ""
