[wallpaper]
enabled = true
fill_mode = "crop"                                                    # center | crop | fit | stretch | repeat | span
fill_color = ""                                                       # fallback color for unfilled areas
transition = ["fade", "wipe", "disc", "stripes", "zoom", "honeycomb"]
transition_duration = 1500                                            # milliseconds
edge_smoothness = 0.3
transition_on_startup = false
directory = "~/Pictures/Wallpapers"

[wallpaper.default]
path = "" # optional default wallpaper path

[wallpaper.automation]
enabled = false
interval_seconds = 1800
order = "random"
recursive = true

[backdrop]
enabled = false
blur_intensity = 0.5
tint_intensity = 0.3
