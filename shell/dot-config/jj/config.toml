#:schema https://docs.jj-vcs.dev/latest/config-schema.json

[ui]
default-command = "logstatus"
editor = "nvim"
pager = ["less", "-SFRX"]

[git]
push-new-bookmarks = true

[aliases]
rebase-all = ["rebase", "-s", "(::trunk())+ & mutable()", "-d", "trunk()"]
accuse = ["file", "annotate"]
logstatus = ["log", "-T", "log_with_current_files"]

[template-aliases]
log_with_current_files = 'builtin_log_compact ++ if(current_working_copy, diff.summary())'
