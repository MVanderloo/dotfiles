#:schema https://github.com/joshmedeski/sesh/raw/main/sesh.schema.json
blacklist = []
dir_length = 2

[default_session]
preview_command = "eza -T -L 2 --icons --color=always --group-directories-last {}"

[[session]]
name = "Dotfiles"
path = "~/.local/dotfiles/"

[[session]]
name = "Downloads"
path = "~/Downloads"
preview_command = "eza -al --sort=modified -r"
startup_command = "eza -al --sort=modified"
