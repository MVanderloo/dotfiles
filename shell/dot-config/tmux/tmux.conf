################################### GENERAL ####################################
# set-option -g default-terminal "$TERM"
# set-option -a default-terminal "tmux-256color"
# set-option -ag terminal-overrides ",xterm-256color:RGB"
# undercurl support
set-option -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
# underscore colours
set-option -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# yazi image preview
set-option -g allow-passthrough on
set-option -ga update-environment TERM
set-option -ga update-environment TERM_PROGRAM

# set prefix to Ctrl-space
set-option -g prefix C-Space
unbind-key C-b
bind-key C-Space send-prefix

# Reload config
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message 'config reloaded.'

# remove delay after pressing ESC
# any sequences that start with ESC won't work
set-option -sg escape-time 0

# how long to display messages
set-option -g display-time 750

# history size
set-option -g history-limit 100000

# focus events
set-option -g focus-events on

# mouse support for selecting pane and resizing
set-option -g mouse on

################################## STATUS BAR ##################################
set-option -g status-interval 1

set-option -g status-position top
set-option -g status-justify 'left'

set-option -g status-left-length 100
set-option -g status-right-length 100

set-option -g status-style 'bold fg=terminal bg=terminal'

set-option -g window-status-format ' #[default]#I:#W '
set-option -g window-status-current-format '#[fg=black bg=blue] #I:#W '

set-option -g status-left ''
set-option -g status-right ' #[fg=black bg=blue] #{s|#{HOME}|~|:session_path} #[default]'

#################################### PANES #####################################
# index from 1
set-window-option -g pane-base-index 1

# toggle fullscreen for active pane
bind-key m resize-pane -Z

# <prefix>-hjkl: Default pane switching
bind-key h if -F '#{pane_at_left}' '' 'select-pane -L'
bind-key j if -F '#{pane_at_bottom}' '' 'select-pane -D'
bind-key k if -F '#{pane_at_top}' '' 'select-pane -U'
bind-key l if -F '#{pane_at_right}' '' 'select-pane -R'

# delete
# <prefix>-Backspace: delete pane
bind-key BSpace kill-pane
unbind-key x

# window styling
set-window-option -g window-active-style fg=terminal,bg=terminal
set-window-option -g window-style fg=terminal,bg=terminal
set-option -g pane-border-style fg=terminal,bg=terminal
set-option -g pane-active-border-style fg=blue,bg=terminal

# visual indicator for active/inactive pane
# set-window-option -g window-active-style fg=terminal,bg=terminal
# set-window-option -g window-style fg=terminal,bg=color8
# set-option -g pane-border-style fg=terminal,bg=color8
# set-option -g pane-active-border-style fg=terminal,bg=color8

#################################### WINDOWS ###################################
set-option -g base-index 1

# reindex when window is deleted
set-option -g renumber-windows on

# prevent tmux renaming windows
set-option -g allow-rename off

# window switching
bind-key n next-window
bind-key N swap-window -t +1 \; select-window -t +1
bind-key p previous-window
bind-key P swap-window -t -1 \; select-window -t -1

# move current pane
bind-key C break-pane       # to new window
bind-key < join-pane -t :-1 # to previous window
bind-key > join-pane -t :+1 # to next window

# split current pane
bind-key - split-window -v
bind-key \\ split-window -h

# split whole window
bind-key _ split-window -fv
bind-key | split-window -fh

################################## COPY MODE ###################################
# vi style keybindings
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle \; send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi Y send-keys -X append-selection-and-cancel
bind-key -T copy-mode-vi 'C-[' send-keys -X cancel
bind-key -T copy-mode-vi 'Escape' send-keys -X cancel

# scroll one line at a time
bind-key -T copy-mode-vi WheelUpPane send-keys -N 1 -X scroll-up
bind-key -T copy-mode-vi WheelDownPane send-keys -N 1 -X scroll-down

# don't exit scroll mode when scrolling with mouse
unbind-key -T copy-mode-vi MouseDragEnd1Pane

################################### SESSIONS ###################################
set-environment -g FZF_DEFAULT_OPTS_FILE "$HOME/.config/fzf/config"

# sesh is a tmux session manager
bind-key -N 'attach to last session' L run-shell 'sesh last'
bind-key -N 'attach to root session' S run-shell 'sesh connect --root "$(pwd)"'
bind-key -N 'session manager' s run-shell "sesh connect \"\$(
  sesh list --icons | fzf-tmux --no-sort --reverse \
    -p 100%,100% --ansi --padding 1,2 --prompt='❯ '\
    --border=none --input-border=bold --preview-border=bold \
    --header '^a all ^t tmux ^g configs ^x zoxide ^f find ^d kill' \
    --bind 'tab:down,btab:up,ctrl-j:down,ctrl-k:up,ctrl-n:down,ctrl-p:up' \
    --bind 'ctrl-a:reload(sesh list --icons)' \
    --bind 'ctrl-t:reload(sesh list -t --icons)' \
    --bind 'ctrl-g:reload(sesh list -c --icons)' \
    --bind 'ctrl-x:reload(sesh list -z --icons)' \
    --bind 'ctrl-f:reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+reload(sesh list --icons)' \
    --preview 'sesh preview {}' --preview-window 'right:50%' \
)\""
